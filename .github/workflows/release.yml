name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  packages: write

jobs:
  test:
    name: Test Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26.5"
          cache-dependency-path: go.sum

      - name: Run tests
        run: go test -race ./...

  build:
    name: Build Binaries
    needs: [test]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: api
            binary: api
          - target: grpc
            binary: grpc
          - target: migrate
            binary: migrate
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26.5"
          cache-dependency-path: go.sum

      - name: Build linux/amd64
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build \
            -ldflags="-s -w" \
            -o dist/${{ matrix.binary }}-linux-amd64 \
            ./cmd/${{ matrix.target }}

      - name: Build linux/arm64
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build \
            -ldflags="-s -w" \
            -o dist/${{ matrix.binary }}-linux-arm64 \
            ./cmd/${{ matrix.target }}

      - name: Upload artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ${{ matrix.binary }}-binaries
          path: dist/
          retention-days: 1

  docker:
    name: Docker Build & Push
    needs: [test]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [api, grpc, migrate]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Log in to GHCR
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5730b3aa6a7f9ea4f99a6f2a46c9e7e50ec02a5 # v3.11.1

      - name: Build and push
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: .
          target: ${{ matrix.target }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/mr-kaynak/go-core-${{ matrix.target }}:${{ github.ref_name }}
            ghcr.io/mr-kaynak/go-core-${{ matrix.target }}:latest

  release:
    name: GitHub Release
    needs: [build, docker]
    runs-on: ubuntu-latest
    steps:
      - name: Download all binary artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: dist/
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058e918f5bb480 # v2.2.2
        with:
          generate_release_notes: true
          files: dist/*
