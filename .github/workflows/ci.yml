name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.9.0
          args: --timeout=5m

  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: go_core_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Download dependencies
        run: go mod download

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: go_core_test
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_SSL_MODE: disable
          JWT_SECRET: test-jwt-secret-key-for-ci-pipeline-min32chars
          JWT_REFRESH_SECRET: test-jwt-refresh-secret-for-ci-pipeline-min32chars
          JWT_ISSUER: go-core-test
          RABBITMQ_URL: amqp://guest:guest@localhost:5672/
          RABBITMQ_EXCHANGE: go-core-test
          RABBITMQ_QUEUE_PREFIX: test
          SMTP_HOST: localhost
          SMTP_PORT: 1025
          SMTP_FROM_EMAIL: test@example.com
          SMTP_FROM_NAME: Go Core Test
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Coverage
        run: go tool cover -func=coverage.out
