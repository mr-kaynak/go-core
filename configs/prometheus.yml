global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'go-core-api'
    metrics_path: /metrics
    static_configs:
      - targets: ['host.docker.internal:3000']
        labels:
          service: 'go-core-api'
  - job_name: 'jaeger-spanmetrics'
    static_configs:
      - targets: ['jaeger:8889']
