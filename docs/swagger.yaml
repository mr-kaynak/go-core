        "400":
          description: Invalid template ID or request body
          schema:
            $ref: '#/definitions/github_com_mr-kaynak_go-core_internal_core_errors.ProblemDetail'
        "403":
          description: Cannot modify system templates
          schema:
            $ref: '#/definitions/github_com_mr-kaynak_go-core_internal_core_errors.ProblemDetail'
        "404":
          description: Template not found
          schema:
            $ref: '#/definitions/github_com_mr-kaynak_go-core_internal_core_errors.ProblemDetail'
