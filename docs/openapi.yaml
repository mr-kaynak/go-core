info:
  contact:
    name: Go-Core Team
    url: https://github.com/mr-kaynak/go-core
  description: Enterprise-grade Go boilerplate with REST API, gRPC services, and
    notification system
  license:
    name: MIT
  title: Go-Core API
  version: 1.0.0
paths:
  /:
    get:
      description: Returns current API status information including name, version and uptime
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
      summary: Get API status
      tags:
        - Health
  /admin/api-keys:
    get:
      description: Returns a paginated list of all API keys with sensitive hash
        stripped. Requires admin role.
      parameters:
        - schema:
            type: integer
            default: 1
          description: Page number
          in: query
          name: page
        - schema:
            type: integer
            default: 20
          description: Items per page
          in: query
          name: limit
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/github_com_mr-kaynak_go-core_internal_api_response.\
                  PaginatedResponse-modules_identity_api_APIKeySafeResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/github_com_mr-kaynak_go-core_internal_core_errors.P\
                  roblemDetail"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/github_com_mr-kaynak_go-core_internal_core_errors.P\
                  roblemDetail"
      security:
        - Bearer: []
      summary: List all API keys
      tags:
        - Admin
  /admin/api-keys/{id}:
    delete:
      description: Revokes an API key by its ID. Requires admin role.
      parameters:
        - schema:
            type: string
          description: API Key UUID
          in: path
          name: id
          required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/modules_identity_api.MessageResponse"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
