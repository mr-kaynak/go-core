                  roblemDetail"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/github_com_mr-kaynak_go-core_internal_core_errors.P\
                  roblemDetail"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/github_com_mr-kaynak_go-core_internal_core_errors.P\
                  roblemDetail"
      security:
        - Bearer: []
      summary: Export audit logs
      tags:
        - Admin
