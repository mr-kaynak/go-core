      tags:
        - Admin
  /admin/audit-logs/export:
    get:
      description: Exports audit logs as a downloadable JSON file. Supports filtering
        by date range, action and user. Requires admin role.
      parameters:
        - schema:
            type: string
          description: Start date (YYYY-MM-DD)
          in: query
          name: start_date
        - schema:
            type: string
          description: End date (YYYY-MM-DD)
          in: query
          name: end_date
        - schema:
            type: string
          description: Filter by action type
          in: query
          name: action
        - schema:
            type: string
          description: Filter by user UUID
          in: query
          name: user_id
      responses:
        "200":
          description: JSON file download
          content:
            application/json:
              schema:
                type: string
                contentMediaType: application/octet-stream
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/github_com_mr-kaynak_go-core_internal_core_errors.P\
