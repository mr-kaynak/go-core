      description: Returns all audit logs with optional filtering. Requires admin role.
      parameters:
        - schema:
            type: integer
            default: 1
          description: Page number
          in: query
          name: page
        - schema:
            type: integer
            default: 20
          description: Items per page
          in: query
          name: limit
        - schema:
            type: string
          description: Filter by user ID
          in: query
          name: user_id
        - schema:
            type: string
          description: Filter by action
          in: query
          name: action
        - schema:
            type: string
          description: Filter by resource
          in: query
          name: resource
        - schema:
            type: string
          description: Filter by resource ID
          in: query
          name: resource_id
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/modules_identity_api.ListAuditLogsResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
