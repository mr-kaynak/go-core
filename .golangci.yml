run:
  timeout: 5m

linters:
  enable:
    - bodyclose
    - dogsled
    - dupl
    - errcheck
    - exhaustive
    - gochecknoinits
    - goconst
    - gocritic
    - gocyclo
    - gofmt
    - goimports
    - goprintffuncname
    - gosec
    - gosimple
    - govet
    - ineffassign
    - lll
    - misspell
    - mnd
    - nakedret
    - noctx
    - nolintlint
    - prealloc
    - predeclared
    - revive
    - staticcheck
    - stylecheck
    - thelper
    - tparallel
    - typecheck
    - unconvert
    - unparam
    - unused
    - wastedassign
    - whitespace

linters-settings:
  dupl:
    threshold: 100
  exhaustive:
    default-signifies-exhaustive: false
  gocyclo:
    min-complexity: 15
  govet:
    enable:
      - shadow
  lll:
    line-length: 120
  misspell:
    locale: US
  mnd:
    checks:
      - argument
      - case
      - condition
      - return
    ignored-numbers:
      - "0"
      - "1"
      - "2"
      - "10"
      - "100"
  nolintlint:
    allow-unused: false
    require-explanation: true
    require-specific: true
  revive:
    confidence: 0.8
  gocritic:
    enabled-tags:
      - diagnostic
      - experimental
      - opinionated
      - performance
      - style
    disabled-checks:
      - dupImport
      - ifElseChain
      - octalLiteral
      - whyNoLint
      - wrapperFunc
  gosec:
    excludes:
      - G104
      - G204

issues:
  exclude-dirs:
    - vendor
    - test
    - scripts
    - platform
  exclude-files:
    - ".*\\.generated\\.go$"
    - ".*\\.pb\\.go$"
  exclude-dirs-use-default: false
  exclude-rules:
    - path: _test\.go
      linters:
        - mnd
        - dupl
        - gosec
    - path: internal/infrastructure
      linters:
        - dupl
    - linters:
        - lll
      source: "^//go:generate "
