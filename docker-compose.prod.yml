services:
  migrate:
    image: ghcr.io/mr-kaynak/go-core-migrate:latest
    container_name: go-core-migrate
    restart: "no"
    env_file:
      - .env
    command: ["up"]
    networks:
      - go-core-network

  api:
    image: ghcr.io/mr-kaynak/go-core-api:latest
    container_name: go-core-api
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "127.0.0.1:3000:3000"
      - "127.0.0.1:50051:50051"
      - "127.0.0.1:9090:9090"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - go-core-network
      - shared-services

  redis:
    image: redis:7-alpine
    container_name: go-core-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - go-core-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: go-core-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    ports:
      - "127.0.0.1:5672:5672"
      - "127.0.0.1:15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - go-core-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailhog:
    image: mailhog/mailhog:latest
    container_name: go-core-mailhog
    restart: unless-stopped
    ports:
      - "127.0.0.1:1025:1025"
      - "127.0.0.1:8025:8025"
    networks:
      - go-core-network

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: go-core-jaeger
    restart: unless-stopped
    environment:
      COLLECTOR_ZIPKIN_HOST_PORT: :9411
      COLLECTOR_OTLP_ENABLED: true
    ports:
      - "127.0.0.1:16686:16686"
      - "127.0.0.1:14317:4317"
      - "127.0.0.1:14318:4318"
    networks:
      - go-core-network

  prometheus:
    image: prom/prometheus:latest
    container_name: go-core-prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    ports:
      - "127.0.0.1:9091:9090"
    volumes:
      - prometheus_data:/prometheus
    networks:
      - go-core-network
    configs:
      - source: prometheus_yml
        target: /etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana:latest
    container_name: go-core-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_INSTALL_PLUGINS: redis-datasource
    ports:
      - "127.0.0.1:3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    configs:
      - source: grafana_datasource
        target: /etc/grafana/provisioning/datasources/datasource.yml
      - source: grafana_dashboard_provider
        target: /etc/grafana/provisioning/dashboards/dashboard.yml
    networks:
      - go-core-network
    depends_on:
      - prometheus

configs:
  prometheus_yml:
    content: |
      global:
        scrape_interval: 15s
        evaluation_interval: 15s
      scrape_configs:
        - job_name: 'go-core-api'
          metrics_path: /metrics
          static_configs:
            - targets: ['api:9090']
              labels:
                service: 'go-core-api'
  grafana_datasource:
    content: |
      apiVersion: 1
      datasources:
        - name: Prometheus
          type: prometheus
          access: proxy
          url: http://prometheus:9090
          uid: go-core-prom
          isDefault: true
          editable: true
  grafana_dashboard_provider:
    content: |
      apiVersion: 1
      providers:
        - name: 'go-core'
          orgId: 1
          folder: ''
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /etc/grafana/provisioning/dashboards
            foldersFromFilesStructure: false

networks:
  go-core-network:
    driver: bridge
  shared-services:
    external: true

volumes:
  redis_data:
    driver: local
  rabbitmq_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
